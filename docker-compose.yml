services:
  postgres:
    image: postgres:18-alpine
    container_name: lovelion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lovelion}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: golang:1.25.9-alpine
    container_name: lovelion-backend
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      PORT: "8080"
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-}
      RECEIPT_EXTRACT_ENABLED: ${RECEIPT_EXTRACT_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      RECEIPT_EXTRACT_RATE_LIMIT_PER_DAY: ${RECEIPT_EXTRACT_RATE_LIMIT_PER_DAY:-20}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-200}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "go mod tidy && go run cmd/migrate/main.go && go run main.go"

  frontend:
    image: node:24-alpine
    container_name: lovelion-frontend
    working_dir: /app
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-}
      NUXT_PUBLIC_APP_VERSION: ${NUXT_PUBLIC_APP_VERSION:-dev}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      BASE_URL: http://frontend:3000
    depends_on:
      - frontend
    profiles:
      - test

volumes:
  postgres_data:
