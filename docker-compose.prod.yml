services:
  postgres:
    image: postgres:18-alpine
    container_name: lovelion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lovelion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
    restart: unless-stopped

  migrate:
    image: lovelion-backend:${VERSION:-latest}
    build: ./backend
    container_name: lovelion-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./migrate"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    restart: "no"

  backend:
    image: lovelion-backend:${VERSION:-latest}
    build: ./backend
    container_name: lovelion-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      GIN_MODE: release
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN}
      RECEIPT_EXTRACT_ENABLED: ${RECEIPT_EXTRACT_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      RECEIPT_EXTRACT_RATE_LIMIT_PER_DAY: ${RECEIPT_EXTRACT_RATE_LIMIT_PER_DAY:-20}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    stop_grace_period: 15s
    restart: unless-stopped

  frontend:
    image: lovelion-frontend:${VERSION:-latest}
    build: ./frontend
    container_name: lovelion-frontend
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-}
    ports:
      - "${PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "0.5"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
